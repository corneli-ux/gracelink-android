name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build_output.log

      - name: Print debug keystore SHA-1 (needed for Google Sign-In in Firebase Console)
        if: always()
        run: |
          KEYSTORE="$HOME/.android/debug.keystore"
          if [ -f "$KEYSTORE" ]; then
            FPRINT=$(keytool -list -v -keystore "$KEYSTORE" -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA1:" | head -1)
            echo "::warning::Debug keystore ${FPRINT}"
          else
            echo "::warning::No debug keystore found at $KEYSTORE"
          fi

      - name: Surface compiler errors as annotations
        if: failure()
        run: |
          grep -n -E "error:|^e: " /tmp/build_output.log | head -60 | while IFS= read -r line; do
            escaped=$(echo "$line" | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error::${escaped}"
          done
          echo "---- full tail for context ----"
          tail -n 200 /tmp/build_output.log

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gracelink-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: ignore
          retention-days: 7
